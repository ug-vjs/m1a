        </div>

    startMovieSlider();

  function startMovieSlider() {
    const slider = document.querySelector('#movie-slider');
    let scrollAmount = 0;
    const slideStep = 1; // pixels per frame
    const slideSpeed = 15; // lower = faster
    const resetDelay = 2000;

    function autoSlide() {
      scrollAmount += slideStep;
      if (scrollAmount >= slider.scrollWidth - slider.clientWidth) {
        scrollAmount = 0;
        slider.scrollTo({ left: 0, behavior: 'auto' });
        setTimeout(autoSlide, resetDelay);
      } else {
        slider.scrollTo({ left: scrollAmount, behavior: 'smooth' });
        setTimeout(autoSlide, slideSpeed);
      }
    }

    autoSlide();
  }

<script>
async function searchPosts(e, auto = false) {
  if (e) e.preventDefault();
  const query = document.getElementById("search-input").value;
  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "<p>Loading...</p>";

  try {
    const res = await fetch(`https://gynecologist.shop/wp-json/wp/v2/posts?_embed&search=${encodeURIComponent(query)}`);
    const posts = await res.json();

    if (posts.length === 0) {
      resultsDiv.innerHTML = "<p>No results found.</p>";
      return;
    }

    resultsDiv.innerHTML = posts.map(post => {
      let imgHtml = "";
      if (post._embedded && post._embedded['wp:featuredmedia']) {
        const imgUrl = post._embedded['wp:featuredmedia'][0].source_url;
        imgHtml = `
          <div class="result-image-wrapper" onclick="window.open('${post.link}', '_blank')">
            <img src="${imgUrl}" alt="${post.title.rendered}">
            <div class="play-button"></div>
          </div>
        `;
      }

      return `
        <div class="result-card">
          ${imgHtml}
          <div class="result-card-content">
            <a href="${post.link}" target="_blank">${post.title.rendered}</a>
            <p>${post.excerpt.rendered.replace(/<[^>]+>/g, "").substring(0, 120)}...</p>
          </div>
        </div>
      `;
    }).join("");
  } catch (err) {
    resultsDiv.innerHTML = "<p>Error fetching results.</p>";
  }
}

// Auto search on page load
window.addEventListener("DOMContentLoaded", () => {
  const defaultKeyword = " "; // change this word as needed
  document.getElementById("search-input").value = defaultKeyword;
  searchPosts(null, true);
});
</script>

<script>
// === BLOGGER SITE URL ===
const BLOG_URL = "https://www.gynecologist.shop/";

/* --- Fetch Blogger Posts by Search Query --- */
function searchPosts(query) {
  if (!query) return;
  const script = document.createElement("script");
  script.src = `${BLOG_URL}/feeds/posts/default?alt=json-in-script&q=${encodeURIComponent(query)}&max-results=30&callback=showSearchResults`;
  document.body.appendChild(script);
}

/* --- Render Search Results --- */
function showSearchResults(json) {
  const container = document.getElementById("searchResults");
  container.innerHTML = "";

  if (!json.feed || !json.feed.entry) {
    container.innerHTML = `<p style="text-align:center;color:#aaa;">No results found.</p>`;
    return;
  }

  let html = "";
  json.feed.entry.forEach(entry => {
    const title = entry.title.$t;
    let url = "";
    let img = "https://via.placeholder.com/300x450?text=No+Image";

    // Post link
    if (entry.link) {
      entry.link.forEach(l => {
        if (l.rel === "alternate") url = l.href;
      });
    }

    // Thumbnail
    if (entry.media$thumbnail) {
      img = entry.media$thumbnail.url.replace("/s72-c/", "/s400/");
    } else if (entry.content) {
      const match = entry.content.$t.match(/<img[^>]+src="([^">]+)"/);
      if (match) img = match[1];
    }

    html += `
      <div class="result-card">
        <a href="${url}" target="_blank" rel="noopener noreferrer">
          <img src="${img}" alt="${title}">
          <div class="result-title">${title}</div>
        </a>
      </div>
    `;
  });

  container.innerHTML = html;
}

/* --- Search Button Event --- */
document.getElementById("searchBtn").addEventListener("click", () => {
  const query = document.getElementById("searchInput").value.trim();
  searchPosts(query);
});

/* --- Allow "Enter" Key to Search --- */
document.getElementById("searchInput").addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    document.getElementById("searchBtn").click();
  }
});
</script>

<style>
/* ===== SEARCH BOX STYLE ===== */

  background: #e50914;

  font-size: 22px;
  cursor: pointer;
  transition: transform 0.3s ease, background 0.3s ease;

.search-bar-wrapper button:hover {
  transform: scale(1.1);
  background: #b00610;
}

/* ===== SEARCH RESULTS ===== */
.search-results {
  max-width: 1000px;
  margin: 40px auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
  color: #fff;
}

.result-card {
  background: #111;
  border-radius: 8px;
  overflow: hidden;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.6);
  transition: transform 0.3s ease;
}

.result-card:hover {
  transform: scale(1.05);
}

.result-card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.result-title {
  background: #e50914;
  padding: 10px;
  font-weight: bold;
  text-transform: capitalize;
  font-size: 15px;
}
</style>

<script>
// === BLOGGER SITE URL ===
const BLOG_URL = "https://www.gynecologist.shop";

/* --- Fetch Blogger Posts by Search Query --- */
function searchPosts(query) {
  if (!query) return;
  const script = document.createElement("script");
  script.src = `${BLOG_URL}/feeds/posts/default?alt=json-in-script&q=${encodeURIComponent(query)}&max-results=30&callback=showSearchResults`;
  document.body.appendChild(script);
}

/* --- Render Search Results --- */
function showSearchResults(json) {
  const container = document.getElementById("searchResults");
  container.innerHTML = "";

  if (!json.feed || !json.feed.entry) {
    container.innerHTML = `<p style="text-align:center;color:#aaa;">No results found.</p>`;
    return;
  }

  let html = "";
  json.feed.entry.forEach(entry => {
    const title = entry.title.$t;
    let url = "";
    let img = "https://via.placeholder.com/300x450?text=No+Image";

    // Post link
    if (entry.link) {
      entry.link.forEach(l => {
        if (l.rel === "alternate") url = l.href;
      });
    }

    // Thumbnail
    if (entry.media$thumbnail) {
      img = entry.media$thumbnail.url.replace("/s72-c/", "/s400/");
    } else if (entry.content) {
      const match = entry.content.$t.match(/<img[^>]+src="([^">]+)"/);
      if (match) img = match[1];
    }

    html += `
      <div class="result-card">
        <a href="${url}" target="_blank" rel="noopener noreferrer">
          <img src="${img}" alt="${title}">
          <div class="result-title">${title}</div>
        </a>
      </div>
    `;
  });

  container.innerHTML = html;
}

/* --- Search Button Event --- */
document.getElementById("searchBtn").addEventListener("click", () => {
  const query = document.getElementById("searchInput").value.trim();
  searchPosts(query);
});

/* --- Allow "Enter" Key to Search --- */
document.getElementById("searchInput").addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    document.getElementById("searchBtn").click();
  }
});
</script>

<script>
(function () {
  var devtoolsOpen = false;
  var redirectTimer = null;
  var threshold = 160;
  var redirectDelay = 2000;

  function blockPage() {
    document.getElementById("devtools-warning").style.display = "flex";
    document.body.style.overflow = "hidden";
    document.body.style.pointerEvents = "none";
    document.getElementById("devtools-warning").style.pointerEvents = "all";
  }

  function unblockPage() {
    document.getElementById("devtools-warning").style.display = "none";
    document.body.style.overflow = "";
    document.body.style.pointerEvents = "";
  }

  setInterval(function () {
    var widthDiff = window.outerWidth - window.innerWidth;
    var heightDiff = window.outerHeight - window.innerHeight;

    if (widthDiff > threshold || heightDiff > threshold) {
      if (!devtoolsOpen) {
        devtoolsOpen = true;
        blockPage();

        redirectTimer = setTimeout(function () {
          window.location.href = "/";
        }, redirectDelay);
      }
    } else {
      if (devtoolsOpen) {
        devtoolsOpen = false;
        unblockPage();
        clearTimeout(redirectTimer);
      }
    }
  }, 500);

  document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
  });

  document.addEventListener("keydown", function (e) {
    if (
      e.key === "F12" ||
      (e.ctrlKey &amp;&amp; e.shiftKey &amp;&amp; ["I","J","C"].indexOf(e.key) !== -1) ||
      (e.ctrlKey &amp;&amp; e.key === "U") ||
      (e.ctrlKey &amp;&amp; e.key === "S")
    ) {
      e.preventDefault();
      window.location.href = "/";
    }
  });

  document.addEventListener("selectstart", function (e) {
    e.preventDefault();
  });
})();
</script>
